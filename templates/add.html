<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Business - Kubwa Business Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      body { font-family: "Inter", sans-serif; background-color: #f8f9fa; height: 100vh; display: flex; align-items: center; }
      .form-card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08); }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card form-card p-4 p-md-5">
            <h2 class="fw-bold mb-1 text-center">List Your Business</h2>
            <p class="text-muted text-center mb-4">Join the Kubwa local directory</p>
            <form action="/add" method="POST">
              <div class="form-floating mb-3">
                <input type="text" name="name" class="form-control" id="bizName" placeholder="Business Name" required />
                <label for="bizName">Business Name</label>
              </div>
              <div class="form-floating mb-3">
                <input type="text" name="category" class="form-control" id="bizCategory" placeholder="Category" required />
                <label for="bizCategory">Category (e.g., Tech, Retail)</label>
              </div>
              <div class="form-floating mb-4">
                <textarea name="description" class="form-control" id="bizDesc" placeholder="Description" style="height: 110px" required></textarea>
                <label for="bizDesc">Short Description</label>
              </div>
              <div class="d-flex justify-content-between align-items-center mt-2">
                <a href="/" class="text-decoration-none text-muted">← Back to Directory</a>
                <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">Publish Listing</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
