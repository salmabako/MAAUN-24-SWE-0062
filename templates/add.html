<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Add Business - Kubwa Business Hub</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <style>
      :root {
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --accent-light: #eef2ff;
        --surface: #ffffff;
        --bg: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --border: #e2e8f0;
      }

      * { box-sizing: border-box; }

      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text-primary);
        margin: 0;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* Navbar */
      .site-nav {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.85);
      }
      .site-nav .brand {
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text-primary);
        text-decoration: none;
      }
      .site-nav .brand span {
        color: var(--accent);
      }

      /* Form area */
      .form-wrapper {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 2rem 1rem;
      }
      .form-card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 2.5rem;
        width: 100%;
        max-width: 520px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      }
      .form-card .form-header {
        text-align: center;
        margin-bottom: 2rem;
      }
      .form-card .form-header h2 {
        font-weight: 700;
        font-size: 1.5rem;
        margin-bottom: 0.25rem;
      }
      .form-card .form-header p {
        color: var(--text-secondary);
        font-size: 0.9rem;
        margin: 0;
      }

      /* Inputs */
      .form-floating .form-control {
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-size: 0.925rem;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }
      .form-floating .form-control:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
      }
      .form-floating label {
        color: var(--text-secondary);
        font-size: 0.9rem;
      }

      /* Buttons */
      .btn-submit {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 0.625rem 1.5rem;
        font-weight: 600;
        font-size: 0.9rem;
        transition: all 0.15s ease;
      }
      .btn-submit:hover {
        background: var(--accent-hover);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }
      .back-link {
        color: var(--text-secondary);
        text-decoration: none;
        font-size: 0.875rem;
        font-weight: 500;
        transition: color 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.25rem;
      }
      .back-link:hover {
        color: var(--text-primary);
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <div class="container">
        <a class="brand" href="/">
          <span>Kubwa Business Hub</span>
        </a>
      </div>
    </nav>

    <div class="form-wrapper">
      <div class="form-card">
        <div class="form-header">
          <h2>List Your Business</h2>
          <p>Join the Kubwa local directory</p>
        </div>

        <form action="/add" method="POST">
          <div class="form-floating mb-3">
            <input
              type="text"
              name="name"
              class="form-control"
              id="bizName"
              placeholder="Business Name"
              required
            />
            <label for="bizName">Business Name</label>
          </div>

          <div class="form-floating mb-3">
            <input
              type="text"
              name="category"
              class="form-control"
              id="bizCategory"
              placeholder="Category"
              required
            />
            <label for="bizCategory">Category (e.g., Tech, Retail)</label>
          </div>

          <div class="form-floating mb-4">
            <textarea
              name="description"
              class="form-control"
              id="bizDesc"
              placeholder="Description"
              style="height: 110px"
              required
            ></textarea>
            <label for="bizDesc">Short Description</label>
          </div>

          <div class="d-flex justify-content-between align-items-center mt-2">
            <a href="/" class="back-link">
              <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
              Back to Directory
            </a>
            <button type="submit" class="btn btn-submit">
              Publish Listing
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>
