<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kubwa Business Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div class="container mt-5">
      <h1>Kubwa Business Hub</h1>
      <p>Explore the latest businesses added to the directory.</p>
      <div class="row g-4">
        {% for biz in businesses %}
        <div class="col-md-6 col-lg-4">
          <div class="card h-100 p-3">
            <h5>{{ biz.name }}</h5>
            <span class="badge bg-secondary mb-2">{{ biz.category }}</span>
            <p>{{ biz.description }}</p>
            <small class="text-muted">{{ biz.get_formatted_time() }}</small>
          </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
          <p>No businesses added yet.</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
