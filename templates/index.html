<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kubwa Business Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --accent: #6366f1;
        --accent-hover: #4f46e5;
        --accent-light: #eef2ff;
        --surface: #ffffff;
        --bg: #f8fafc;
        --text-primary: #0f172a;
        --text-secondary: #64748b;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        font-family: "Inter", sans-serif;
        background-color: var(--bg);
        color: var(--text-primary);
        margin: 0;
      }
      .site-nav {
        background: var(--surface);
        border-bottom: 1px solid var(--border);
        padding: 1rem 0;
        position: sticky;
        top: 0;
        z-index: 100;
        backdrop-filter: blur(12px);
        background: rgba(255, 255, 255, 0.85);
      }
      .site-nav .brand {
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--text-primary);
        text-decoration: none;
      }
      .site-nav .brand span { color: var(--accent); }
      .btn-add {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 10px;
        padding: 0.5rem 1.25rem;
        font-weight: 600;
        font-size: 0.875rem;
        text-decoration: none;
        transition: all 0.15s ease;
        display: inline-flex;
        align-items: center;
        gap: 0.375rem;
      }
      .btn-add:hover {
        background: var(--accent-hover);
        color: #fff;
        transform: translateY(-1px);
        box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
      }
    </style>
  </head>
  <body>
    <nav class="site-nav">
      <div class="container d-flex justify-content-between align-items-center">
        <a class="brand" href="/"><span>Kubwa Business Hub</span></a>
        <a href="/add" class="btn-add">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
          Add Business
        </a>
      </div>
    </nav>
    <div class="container mt-4">
      <h4 class="fw-bold">Recent Listings</h4>
      <p class="text-muted">Explore the latest businesses added to the directory.</p>
      <div class="row g-4">
        {% for biz in businesses %}
        <div class="col-md-6 col-lg-4">
          <div class="card h-100 p-3">
            <h5>{{ biz.name }}</h5>
            <span class="badge bg-secondary mb-2">{{ biz.category }}</span>
            <p>{{ biz.description }}</p>
            <small class="text-muted">{{ biz.get_formatted_time() }}</small>
          </div>
        </div>
        {% else %}
        <div class="col-12 text-center py-5">
          <p>No businesses added yet.</p>
        </div>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
